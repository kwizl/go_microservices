services:
  broker:
    build:
      context: ./broker_service
    container_name: "broker"
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - authentication
    networks:
      - microservice-network

  authentication:
    build:
      context: ./auth_service
    container_name: "authentication"
    restart: always
    ports:
      - "8081:80"
    environment:
      - DNS="host.postgres port=5432 user=postgres password=postgres abname=users sslmode=disable connet_timeout=5"
    depends_on:
      - postgres
    networks:
      - microservice-network

  postgres:
    image: postgres:latest
    container_name: postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=users
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - microservice-network
  
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=postgres@gmail.com
      - PGADMIN_DEFAULT_PASSWORD=postgres
    restart: always
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - microservice-network

networks:
  microservice-network:
    driver: bridge

volumes:
  pgadmin_data:
  postgres_data:
